<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공휴일 연차 선택</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif; background: #f2f2f7; color: #1c1c1e; min-height: 100vh; }

/* 이름 입력 화면 */
.name-gate { position: fixed; inset: 0; background: #f2f2f7; z-index: 300; display: flex; align-items: center; justify-content: center; padding: 24px; }
.name-gate-box { background: #fff; border-radius: 20px; padding: 32px 24px; width: 100%; max-width: 340px; text-align: center; }
.name-gate-box h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.name-gate-box p { font-size: 14px; color: #8e8e93; margin-bottom: 24px; line-height: 1.5; }
.name-gate-input { width: 100%; padding: 13px 16px; font-size: 16px; border: 1.5px solid #e5e5ea; border-radius: 12px; font-family: inherit; outline: none; text-align: center; color: #1c1c1e; transition: border-color 0.15s; }
.name-gate-input:focus { border-color: #007aff; }
.name-gate-error { font-size: 13px; color: #ff3b30; margin-top: 8px; min-height: 18px; }
.name-gate-btn { margin-top: 16px; width: 100%; padding: 14px; font-size: 16px; font-weight: 600; background: #007aff; color: #fff; border: none; border-radius: 12px; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
.name-gate-btn:hover { opacity: 0.85; }

.app { max-width: 640px; margin: 0 auto; padding: 0 0 48px; }

/* 현재 사용자 표시 */
.user-bar { background: #fff; border-bottom: 0.5px solid #c6c6c8; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
.user-bar-name { font-size: 13px; color: #8e8e93; }
.user-bar-name strong { color: #1c1c1e; font-weight: 600; }
.my-turn-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: #fff3cd; color: #856404; }
.live-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: #34c759; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: #34c759; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* 탭 */
.tabs { display: flex; background: #fff; border-bottom: 0.5px solid #c6c6c8; }
.tab-btn { flex: 1; padding: 12px; font-size: 14px; font-weight: 500; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; color: #8e8e93; transition: all 0.15s; margin-bottom: -1px; font-family: inherit; }
.tab-btn.active { color: #007aff; border-bottom-color: #007aff; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* 선택순서 탭 */
.order-tab { padding: 16px; }
.admin-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: #8e8e93; padding: 6px 12px; margin-bottom: 16px; cursor: pointer; background: #fff; border: 1px solid #e5e5ea; border-radius: 8px; font-family: inherit; }
.progress-wrap { margin-bottom: 16px; }
.progress-label { font-size: 12px; color: #8e8e93; margin-bottom: 6px; }
.progress-bar { height: 4px; background: #e5e5ea; border-radius: 2px; }
.progress-fill { height: 100%; background: #007aff; border-radius: 2px; transition: width 0.4s ease; }
.order-list { display: flex; flex-direction: column; gap: 8px; }
.order-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-radius: 12px; border: 1px solid #e5e5ea; background: #fff; transition: all 0.3s ease; }
.order-item.current { background: #e8f4ff; border-color: #007aff; }
.order-item.done { opacity: 0.45; }
.order-num { font-size: 12px; color: #aeaeb2; min-width: 20px; text-align: right; flex-shrink: 0; }
.order-name { font-size: 15px; font-weight: 500; flex: 1; }
.order-date { font-size: 12px; color: #007aff; font-weight: 500; margin-right: 4px; }
.order-confirmed-date { font-size: 12px; color: #34c759; font-weight: 600; margin-right: 4px; }
.badge { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
.badge-current { background: #cce5ff; color: #004085; }
.badge-done { background: #f2f2f7; color: #8e8e93; }
.badge-next { background: #d4edda; color: #155724; }
.badge-wait { background: #f2f2f7; color: #8e8e93; }
.badge-confirmed { background: #d4edda; color: #155724; }
.complete-btn { font-size: 12px; padding: 5px 11px; border-radius: 8px; border: 1px solid #007aff; background: none; color: #007aff; cursor: pointer; white-space: nowrap; font-family: inherit; transition: background 0.1s; }
.complete-btn:hover { background: #e8f4ff; }
.complete-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.empty-state { text-align: center; padding: 48px 16px; color: #aeaeb2; }
.empty-state p { font-size: 14px; }
.reset-btn { font-size: 12px; color: #ff3b30; background: none; border: none; cursor: pointer; padding: 4px 0; margin-top: 8px; font-family: inherit; display: none; }

/* 달력 탭 */
.cal-tab { background: #fff; min-height: 100vh; }
.cal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 8px; }
.cal-nav-btn { width: 32px; height: 32px; border-radius: 50%; border: none; background: #f2f2f7; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: #007aff; transition: background 0.1s; }
.cal-nav-btn:hover { background: #e5e5ea; }
.cal-month-title { font-size: 18px; font-weight: 700; color: #1c1c1e; }
.cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); padding: 0 8px; margin-bottom: 4px; }
.cal-weekday { text-align: center; font-size: 12px; font-weight: 500; color: #8e8e93; padding: 6px 0; }
.cal-weekday:first-child { color: #ff3b30; }
.cal-weekday:last-child { color: #007aff; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 0 8px 16px; gap: 2px; }
.cal-cell { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 10px; cursor: default; position: relative; padding: 2px; }
.cal-cell.selectable { cursor: pointer; transition: background 0.1s; }
.cal-cell.selectable:hover { background: #f2f2f7; }
.cal-cell.holiday .cal-num { color: #ff3b30 !important; }
.cal-cell.holiday .cal-inner { border: 2px solid #ff3b30; border-radius: 8px; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.cal-cell.selected .cal-inner { background: #ffd60a; border-color: #ffd60a !important; border-radius: 8px; }
.cal-cell.confirmed .cal-inner { background: #e8f4ff; border: 2px solid #007aff; border-radius: 8px; }
.cal-cell.today .cal-num { font-weight: 700; }
.cal-cell.today:not(.holiday) .cal-inner { background: #007aff; border-radius: 8px; }
.cal-cell.today:not(.holiday) .cal-num { color: #fff !important; }
.cal-inner { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.cal-num { font-size: 15px; font-weight: 400; color: #1c1c1e; line-height: 1; }
.cal-cell.other-month .cal-num { color: #c7c7cc; }
.cal-cell:nth-child(7n+1) .cal-num { color: #ff3b30; }
.cal-cell:nth-child(7n) .cal-num { color: #007aff; }
.cal-cell.other-month .cal-num { color: #c7c7cc !important; }
.cal-cell.holiday .cal-num { color: #ff3b30 !important; }
.cal-cell.today:not(.holiday) .cal-num { color: #fff !important; }
.cal-cell.confirmed .cal-inner { position: relative; }
.confirmed-name { font-size: 8px; color: #007aff; font-weight: 600; margin-top: 1px; line-height: 1; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: center; }
.holiday-name { font-size: 7px; color: #ff3b30; margin-top: 1px; line-height: 1; max-width: 34px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: center; display: none; }
.cal-selection-bar { background: #f2f2f7; border-top: 0.5px solid #c6c6c8; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
.cal-selection-info { font-size: 13px; color: #8e8e93; }
.cal-selection-info strong { color: #1c1c1e; }
.not-your-turn { text-align: center; padding: 16px; font-size: 13px; color: #8e8e93; background: #fff9e6; border-top: 0.5px solid #f0e0a0; }

/* 모달 */
.modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
.modal-backdrop.open { display: flex; }
.modal { background: #fff; border-radius: 16px; padding: 24px; width: 100%; max-width: 360px; max-height: 85vh; overflow-y: auto; }
.modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
.form-row { margin-bottom: 14px; }
.form-row label { display: block; font-size: 12px; color: #8e8e93; margin-bottom: 5px; font-weight: 500; }
.form-row input, .form-row select { width: 100%; padding: 9px 12px; font-size: 14px; border: 1px solid #e5e5ea; border-radius: 8px; background: #fff; color: #1c1c1e; font-family: inherit; outline: none; }
.form-row input:focus, .form-row select:focus { border-color: #007aff; }
.error-msg { font-size: 12px; color: #ff3b30; margin-bottom: 12px; display: none; }
.name-inputs { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; max-height: 280px; overflow-y: auto; }
.name-row { display: flex; align-items: center; gap: 8px; }
.name-row span { font-size: 12px; color: #aeaeb2; min-width: 22px; text-align: right; flex-shrink: 0; }
.name-row input { flex: 1; padding: 7px 10px; font-size: 13px; border: 1px solid #e5e5ea; border-radius: 7px; background: #fff; color: #1c1c1e; font-family: inherit; outline: none; }
.btn-row { display: flex; gap: 8px; justify-content: flex-end; }
.btn { padding: 9px 18px; font-size: 14px; font-weight: 500; border-radius: 8px; cursor: pointer; font-family: inherit; }
.btn-secondary { background: none; border: 1px solid #e5e5ea; color: #8e8e93; }
.btn-primary { background: #007aff; border: none; color: #fff; }
</style>
</head>
<body>

<!-- 이름 입력 게이트 -->
<div class="name-gate" id="name-gate">
  <div class="name-gate-box">
    <h2>안녕하세요!</h2>
    <p>공휴일 연차 선택 시스템입니다.<br>등록된 이름을 입력해주세요.</p>
    <input class="name-gate-input" type="text" id="gate-input" placeholder="이름 입력" maxlength="10">
    <div class="name-gate-error" id="gate-error"></div>
    <button class="name-gate-btn" onclick="submitName()">입장하기</button>
  </div>
</div>

<div class="app" id="main-app" style="display:none">
  <!-- 사용자 바 -->
  <div class="user-bar">
    <div class="user-bar-name"><strong id="display-name"></strong>님</div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="live-badge"><span class="live-dot"></span>실시간</span>
      <span class="my-turn-badge" id="my-turn-badge" style="display:none">내 차례!</span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('order')">선택순서</button>
    <button class="tab-btn" onclick="switchTab('vacation')">vacation file</button>
  </div>

  <!-- 선택순서 탭 -->
  <div id="tab-order" class="tab-content active">
    <div class="order-tab">
      <button class="admin-btn" onclick="openModal()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        순서 관리
      </button>
      <div id="loading-state" style="text-align:center;padding:40px;color:#aeaeb2;font-size:14px">불러오는 중...</div>
      <div id="empty-state" class="empty-state" style="display:none"><p>아직 참가자가 등록되지 않았어요.<br>순서 관리 버튼을 눌러 등록해주세요.</p></div>
      <div id="progress-wrap" class="progress-wrap" style="display:none">
        <div class="progress-label" id="progress-label"></div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      </div>
      <div class="order-list" id="order-list"></div>
      <button class="reset-btn" id="reset-btn" onclick="confirmReset()">처음부터 다시 시작</button>
    </div>
  </div>

  <!-- vacation file 탭 -->
  <div id="tab-vacation" class="tab-content">
    <div class="cal-tab">
      <div class="cal-header">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
        <div class="cal-month-title" id="cal-title"></div>
        <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal-weekdays">
        <div class="cal-weekday">일</div>
        <div class="cal-weekday">월</div>
        <div class="cal-weekday">화</div>
        <div class="cal-weekday">수</div>
        <div class="cal-weekday">목</div>
        <div class="cal-weekday">금</div>
        <div class="cal-weekday">토</div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="cal-selection-bar" id="cal-selection-bar" style="display:none">
        <div class="cal-selection-info" id="cal-selection-info"></div>
      </div>
      <div class="not-your-turn" id="not-your-turn" style="display:none">
        현재 선택 차례가 아니에요. 내 차례가 되면 날짜를 선택할 수 있어요.
      </div>
    </div>
  </div>
</div>

<!-- 관리자 모달 -->
<div class="modal-backdrop" id="modal-backdrop" onclick="handleBackdropClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div id="step-pw">
      <h3>관리자 확인</h3>
      <div class="form-row">
        <label>비밀번호</label>
        <input type="password" id="pw-input" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')checkPw()">
      </div>
      <div class="error-msg" id="pw-error">비밀번호가 올바르지 않아요.</div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="closeModal()">취소</button>
        <button class="btn btn-primary" onclick="checkPw()">확인</button>
      </div>
    </div>
    <div id="step-setup" style="display:none">
      <h3>참가자 순서 설정</h3>
      <div class="form-row">
        <label>인원수</label>
        <select id="count-select" onchange="renderNameInputs()">
          <option value="">선택하세요</option>
        </select>
      </div>
      <div class="name-inputs" id="name-inputs"></div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="closeModal()">취소</button>
        <button class="btn btn-primary" onclick="saveOrder()">저장</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBwtlo2qXpf2rtQGznH_An2_1ByGDv3mV0",
  authDomain: "holiday-vacation-file-dpre.firebaseapp.com",
  databaseURL: "https://holiday-vacation-file-dpre-default-rtdb.firebaseio.com",
  projectId: "holiday-vacation-file-dpre",
  storageBucket: "holiday-vacation-file-dpre.firebasestorage.app",
  messagingSenderId: "655304893070",
  appId: "1:655304893070:web:d3932660471d7339069fdf"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const stateRef = ref(db, 'leaveOrder');

// 2026 한국 법정공휴일
const HOLIDAYS = {
  '2026-01-01': '신정',
  '2026-01-28': '설날 연휴',
  '2026-01-29': '설날',
  '2026-01-30': '설날 연휴',
  '2026-03-01': '삼일절',
  '2026-05-05': '어린이날',
  '2026-05-25': '부처님오신날',
  '2026-06-06': '현충일',
  '2026-08-15': '광복절',
  '2026-09-24': '추석 연휴',
  '2026-09-25': '추석',
  '2026-09-26': '추석 연휴',
  '2026-10-03': '개천절',
  '2026-10-09': '한글날',
  '2026-12-25': '크리스마스'
};

const PW = '0911';
let myName = '';
let calYear = 2026;
let calMonth = 0; // 0-indexed
let appState = { participants: [], currentIndex: 0, selectedDates: {}, confirmedDates: {}, pendingDate: {} };

// Firebase 실시간 수신
onValue(stateRef, (snapshot) => {
  document.getElementById('loading-state').style.display = 'none';
  const data = snapshot.val();
  if (data) {
    appState = {
      participants: data.participants || [],
      currentIndex: data.currentIndex || 0,
      selectedDates: data.selectedDates || {},
      confirmedDates: data.confirmedDates || {},
      pendingDate: data.pendingDate || {}
    };
  } else {
    appState = { participants: [], currentIndex: 0, selectedDates: {}, confirmedDates: {}, pendingDate: {} };
  }
  renderOrder();
  renderCalendar();
  updateMyTurnBadge();
});

function saveState() {
  set(stateRef, appState);
}

// 이름 게이트
window.submitName = function() {
  const val = document.getElementById('gate-input').value.trim();
  if (!val) { document.getElementById('gate-error').textContent = '이름을 입력해주세요.'; return; }
  if (appState.participants.length === 0) { document.getElementById('gate-error').textContent = '아직 참가자 목록이 등록되지 않았어요. 잠시 후 다시 시도해주세요.'; return; }
  if (!appState.participants.includes(val)) { document.getElementById('gate-error').textContent = '이름을 정확히 입력해주세요.'; return; }
  myName = val;
  document.getElementById('name-gate').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  document.getElementById('display-name').textContent = myName;
  renderOrder();
  renderCalendar();
  updateMyTurnBadge();
};

document.getElementById('gate-input').addEventListener('keydown', e => { if (e.key === 'Enter') window.submitName(); });

function updateMyTurnBadge() {
  if (!myName) return;
  const current = getCurrentTurnName();
  document.getElementById('my-turn-badge').style.display = current === myName ? 'inline-block' : 'none';
}

function getCurrentTurnName() {
  const { participants, currentIndex } = appState;
  if (!participants.length) return null;
  const idx = currentIndex % participants.length;
  return participants[idx];
}

function isMyTurn() {
  return myName && getCurrentTurnName() === myName;
}

// 탭 전환
window.switchTab = function(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (i===0&&tab==='order')||(i===1&&tab==='vacation')));
  document.getElementById('tab-order').classList.toggle('active', tab === 'order');
  document.getElementById('tab-vacation').classList.toggle('active', tab === 'vacation');
};

// 선택순서 렌더링
function renderOrder() {
  const { participants, currentIndex, confirmedDates, pendingDate } = appState;
  const list = document.getElementById('order-list');
  const empty = document.getElementById('empty-state');
  const progressWrap = document.getElementById('progress-wrap');
  const resetBtn = document.getElementById('reset-btn');

  if (!participants.length) {
    list.innerHTML = '';
    empty.style.display = 'block';
    progressWrap.style.display = 'none';
    resetBtn.style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  progressWrap.style.display = 'block';
  resetBtn.style.display = 'block';

  const totalRounds = Math.floor(currentIndex / participants.length);
  const posInRound = currentIndex % participants.length;
  const pct = Math.round((posInRound / participants.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent =
    `${posInRound}번째 선택 중 (전체 ${currentIndex}회 완료)`;

  // 현재 라운드 순서: 현재 인덱스(posInRound) 기준으로 정렬
  // 확정된 사람은 맨 아래, 나머지는 순서대로
  const confirmedNames = Object.keys(confirmedDates);

  // 현재 라운드에서 아직 선택 안 한 사람들 (현재 포함)
  let activeList = [];
  for (let i = 0; i < participants.length; i++) {
    const realIdx = (posInRound + i) % participants.length;
    activeList.push({ name: participants[realIdx], isCurrentTurn: i === 0, queuePos: i });
  }

  list.innerHTML = '';

  activeList.forEach(({ name, isCurrentTurn, queuePos }) => {
    const item = document.createElement('div');
    item.className = 'order-item' + (isCurrentTurn ? ' current' : '');

    const myConfirmedDate = confirmedDates[name];
    const myPendingDate = pendingDate[name];

    let badge = '';
    if (isCurrentTurn) badge = '<span class="badge badge-current">선택 중</span>';
    else if (queuePos === 1) badge = '<span class="badge badge-next">다음</span>';
    else badge = `<span class="badge badge-wait">${queuePos}번 후</span>`;

    let dateDisplay = '';
    if (myConfirmedDate) {
      dateDisplay = `<span class="order-confirmed-date">${myConfirmedDate}</span>`;
    } else if (myPendingDate && isCurrentTurn) {
      dateDisplay = `<span class="order-date">${myPendingDate}</span>`;
    }

    item.innerHTML = `
      <span class="order-num">${participants.indexOf(name) + 1}</span>
      <span class="order-name">${name}</span>
      ${dateDisplay}
      ${badge}
    `;

    // 내 차례이고 내가 현재 턴인 경우 완료 버튼
    if (isCurrentTurn && myName === name) {
      const btn = document.createElement('button');
      btn.className = 'complete-btn';
      btn.textContent = '선택 완료 →';
      btn.disabled = !myPendingDate;
      btn.onclick = () => confirmSelection();
      item.appendChild(btn);
    }

    list.appendChild(item);
  });

  // 이미 이번 라운드에서 확정한 사람들 맨 아래 (스무스하게)
  // 이번 라운드에서 이미 선택 완료한 사람 = confirmedDates에 있는 사람 중 현재 라운드에서 처리된 사람
  // 간단히: confirmedDates에 등록된 사람들을 맨 아래 표시
  if (Object.keys(confirmedDates).length > 0) {
    const divider = document.createElement('div');
    divider.style.cssText = 'font-size:11px;color:#aeaeb2;padding:8px 4px 4px;';
    divider.textContent = '— 선택 완료 —';
    list.appendChild(divider);

    Object.entries(confirmedDates).forEach(([name, date]) => {
      const item = document.createElement('div');
      item.className = 'order-item done';
      item.innerHTML = `
        <span class="order-num">${participants.indexOf(name) + 1}</span>
        <span class="order-name">${name}</span>
        <span class="order-confirmed-date">${date}</span>
        <span class="badge badge-confirmed">확정</span>
      `;
      list.appendChild(item);
    });
  }
}

// 달력 렌더링
function renderCalendar() {
  const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('cal-title').textContent = `2026년 ${months[calMonth]}`;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const daysInPrev = new Date(calYear, calMonth, 0).getDate();
  const today = new Date();

  const { confirmedDates, pendingDate } = appState;

  // 확정된 날짜 역방향 맵 {dateStr: name}
  const confirmedDateMap = {};
  Object.entries(confirmedDates).forEach(([name, date]) => {
    confirmedDateMap[date] = name;
  });

  // 내 펜딩 날짜
  const myPending = pendingDate[myName] || null;

  // 이전 달 빈칸
  for (let i = 0; i < firstDay; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell other-month';
    const d = daysInPrev - firstDay + i + 1;
    cell.innerHTML = `<div class="cal-inner"><span class="cal-num">${d}</span></div>`;
    grid.appendChild(cell);
  }

  // 이번 달
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isHoliday = !!HOLIDAYS[dateStr];
    const isConfirmed = !!confirmedDateMap[dateStr];
    const isSelected = myPending === dateStr;
    const isToday = today.getFullYear() === calYear && today.getMonth() === calMonth && today.getDate() === d;
    const isMine = isMyTurn();

    const cell = document.createElement('div');
    let classes = 'cal-cell';
    if (isHoliday && !isConfirmed) classes += ' holiday selectable';
    if (isHoliday && isConfirmed) classes += ' holiday confirmed';
    if (isSelected) classes += ' selected';
    if (isToday) classes += ' today';

    cell.className = classes;

    let inner = `<div class="cal-inner"><span class="cal-num">${d}</span>`;
    if (isConfirmed) {
      inner += `<span class="confirmed-name">${confirmedDateMap[dateStr]}</span>`;
    }
    if (isHoliday) {
      inner += `<span class="holiday-name">${HOLIDAYS[dateStr]}</span>`;
    }
    inner += '</div>';
    cell.innerHTML = inner;

    // 클릭 이벤트: 내 차례이고 공휴일이고 미확정인 경우만
    if (isHoliday && !isConfirmed && isMine) {
      cell.onclick = () => selectDate(dateStr);
    } else if (isHoliday && !isConfirmed && !isMine) {
      cell.onclick = null;
    }

    grid.appendChild(cell);
  }

  // 다음 달 빈칸
  const totalCells = firstDay + daysInMonth;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let i = 1; i <= remaining; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell other-month';
    cell.innerHTML = `<div class="cal-inner"><span class="cal-num">${i}</span></div>`;
    grid.appendChild(cell);
  }

  // 하단 바
  const selBar = document.getElementById('cal-selection-bar');
  const notYourTurn = document.getElementById('not-your-turn');
  const selInfo = document.getElementById('cal-selection-info');

  if (isMyTurn()) {
    notYourTurn.style.display = 'none';
    selBar.style.display = 'flex';
    if (myPending) {
      selInfo.innerHTML = `선택한 날짜: <strong>${myPending}</strong> — 선택순서 탭에서 확정하세요`;
    } else {
      selInfo.innerHTML = `빨간 테두리 날짜를 선택하세요`;
    }
  } else {
    selBar.style.display = 'none';
    if (myName) {
      notYourTurn.style.display = 'block';
    }
  }
}

function selectDate(dateStr) {
  if (!isMyTurn()) return;
  // 토글
  if (appState.pendingDate[myName] === dateStr) {
    delete appState.pendingDate[myName];
  } else {
    appState.pendingDate[myName] = dateStr;
  }
  saveState();
}

function confirmSelection() {
  const pending = appState.pendingDate[myName];
  if (!pending) { alert('vacation file 탭에서 날짜를 먼저 선택해주세요.'); return; }

  // 확정
  appState.confirmedDates[myName] = pending;
  delete appState.pendingDate[myName];
  appState.currentIndex += 1;
  saveState();
}

window.changeMonth = function(dir) {
  calMonth += dir;
  if (calMonth < 0) { calMonth = 0; return; }
  if (calMonth > 11) { calMonth = 11; return; }
  renderCalendar();
};

// 관리자 모달
window.openModal = function() {
  document.getElementById('modal-backdrop').classList.add('open');
  document.getElementById('step-pw').style.display = 'block';
  document.getElementById('step-setup').style.display = 'none';
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').style.display = 'none';
  setTimeout(() => document.getElementById('pw-input').focus(), 50);
};
window.closeModal = function() { document.getElementById('modal-backdrop').classList.remove('open'); };
window.handleBackdropClick = function(e) { if (e.target === document.getElementById('modal-backdrop')) window.closeModal(); };

window.checkPw = function() {
  if (document.getElementById('pw-input').value === PW) {
    document.getElementById('step-pw').style.display = 'none';
    document.getElementById('step-setup').style.display = 'block';
    const sel = document.getElementById('count-select');
    sel.innerHTML = '<option value="">선택하세요</option>';
    for (let i = 2; i <= 40; i++) sel.innerHTML += `<option value="${i}">${i}명</option>`;
    if (appState.participants.length > 0) {
      sel.value = appState.participants.length;
      window.renderNameInputs(appState.participants);
    } else { window.renderNameInputs(); }
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
};

window.renderNameInputs = function(existing) {
  const count = parseInt(document.getElementById('count-select').value) || 0;
  const container = document.getElementById('name-inputs');
  container.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const row = document.createElement('div');
    row.className = 'name-row';
    const val = existing && existing[i] ? existing[i] : '';
    row.innerHTML = `<span>${i+1}</span><input type="text" placeholder="${i+1}번째 선택자" value="${val}">`;
    container.appendChild(row);
  }
};

window.saveOrder = function() {
  const names = Array.from(document.querySelectorAll('#name-inputs input')).map(i => i.value.trim()).filter(Boolean);
  if (names.length < 2) { alert('최소 2명 이상 입력해주세요.'); return; }
  appState.participants = names;
  appState.currentIndex = 0;
  appState.selectedDates = {};
  appState.confirmedDates = {};
  appState.pendingDate = {};
  saveState();
  window.closeModal();
};

window.confirmReset = function() {
  if (confirm('처음부터 다시 시작할까요?')) {
    appState.currentIndex = 0;
    appState.selectedDates = {};
    appState.confirmedDates = {};
    appState.pendingDate = {};
    saveState();
  }
};
</script>
